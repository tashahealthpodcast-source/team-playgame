<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任務集點大挑戰</title>

  <!-- 引入 Tailwind CSS 負責排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 核心 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- 引入 Babel 負責在瀏覽器中編譯 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 Firebase Compat 版本 (最適合單一 HTML 檔案) -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <!-- React 渲染的目標節點 -->
  <div id="root"></div>

  <!-- 應用程式邏輯 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // ⚠️ 請在這裡填入你專屬的 Firebase 設定！
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCNxj337AbO8zTjoAWJnq9oq6gxRef_g1U",
      authDomain: "team-playgame.firebaseapp.com",
      projectId: "team-playgame",
      storageBucket: "team-playgame.firebasestorage.app",
      messagingSenderId: "546707511652",
      appId: "1:546707511652:web:0e791695e1dc6515edc271",
      measurementId: "G-VMXE0S53LN"
    };

    // 初始化 Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- Constants ---
    const AVATARS = ['🐶', '🐱', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷'];
    const MAX_POINTS = 9999;
    const ADMIN_PASSWORD = 'admin123';

    // --- 圖示元件 (取代原本的 lucide-react) ---
    const TrophyIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
    const ShieldAlertIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>;
    const SettingsIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    const LogOutIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
    const XIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const AwardIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;

    // --- Components ---

    const PointVisualizer = ({ points }) => {
      if (!points || points === 0) return <span className="text-gray-400 text-sm font-medium">尚未獲得</span>;
      const displayCount = Math.min(points, 100);
      return (
        <div className="flex flex-wrap gap-1 items-center justify-end">
          {Array.from({ length: displayCount }).map((_, i) => (
            <span key={i} title={`第 ${i + 1} 點`} className="text-lg sm:text-xl drop-shadow-sm hover:scale-110 transition-transform cursor-default">🐾</span>
          ))}
          {points > 100 && <span className="text-sm text-gray-500 ml-1 font-bold">+{points - 100}</span>}
        </div>
      );
    };

    const AdminUserRow = ({ user, onUpdate }) => {
      const [editPoints, setEditPoints] = useState(user.points || 0);
      const [editScore, setEditScore] = useState(user.score || 0);
      const [isSaving, setIsSaving] = useState(false);

      const handleSave = async () => {
        setIsSaving(true);
        let validPoints = Number(editPoints);
        if (validPoints < 0) validPoints = 0;
        if (validPoints > MAX_POINTS) validPoints = MAX_POINTS;

        let validScore = Number(editScore);
        if (validScore < 0) validScore = 0;
        if (validScore > MAX_POINTS) validScore = MAX_POINTS;
        
        await onUpdate(user.id, validPoints, validScore);
        setEditPoints(validPoints);
        setEditScore(validScore);
        setIsSaving(false);
      };

      return (
        <div className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-white border-b hover:bg-gray-50 transition-colors gap-4">
          <div className="flex items-center space-x-3">
            <span className="text-3xl">{user.avatar}</span>
            <div>
              <p className="font-bold text-gray-800">{user.name}</p>
              <p className="text-sm text-gray-500">
                集點: {user.points} | 戰績: {user.score || 0}
              </p>
            </div>
          </div>
          <div className="flex items-center space-x-2 text-sm">
            <div className="flex flex-col">
              <label className="text-xs text-gray-500 mb-1">集點數字</label>
              <input type="number" min="0" max={MAX_POINTS} value={editPoints} onChange={(e) => setEditPoints(e.target.value)} className="w-20 px-2 py-1.5 border rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div className="flex flex-col">
              <label className="text-xs text-gray-500 mb-1">戰績數字</label>
              <input type="number" min="0" max={MAX_POINTS} value={editScore} onChange={(e) => setEditScore(e.target.value)} className="w-20 px-2 py-1.5 border rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <button onClick={handleSave} disabled={isSaving || (Number(editPoints) === user.points && Number(editScore) === (user.score || 0))} className={`px-4 py-2 mt-4 sm:mt-0 rounded-lg font-medium flex items-center transition-all ${(Number(editPoints) !== user.points || Number(editScore) !== (user.score || 0)) && !isSaving ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
              {isSaving ? '儲存中...' : '更新'}
            </button>
          </div>
        </div>
      );
    };

    function App() {
      const [authUser, setAuthUser] = useState(null);
      const [allUsers, setAllUsers] = useState([]);
      const [profile, setProfile] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [firebaseError, setFirebaseError] = useState('');
      
      const [view, setView] = useState('loading');
      const [setupName, setSetupName] = useState('');
      const [setupAvatar, setSetupAvatar] = useState(AVATARS[0]);
      const [setupError, setSetupError] = useState('');
      
      const [showAdminModal, setShowAdminModal] = useState(false);
      const [adminPwdInput, setAdminPwdInput] = useState('');
      const [adminError, setAdminError] = useState('');
      const [isAdmin, setIsAdmin] = useState(false);

      const [myScoreInput, setMyScoreInput] = useState('');
      const [isUpdatingMyScore, setIsUpdatingMyScore] = useState(false);

      useEffect(() => {
        if (profile) {
          setMyScoreInput(profile.score?.toString() || '0');
        }
      }, [profile?.score]);

      useEffect(() => {
        // 檢查是否填寫了 Firebase Config
        if (firebaseConfig.apiKey.includes('請貼上') || firebaseConfig.apiKey.includes('請替換成')) {
          setFirebaseError('請先從 Firebase 控制台複製您的 apiKey 貼到程式碼中，然後記得「存檔」再重新整理喔！');
          setIsLoading(false);
          return;
        }

        const initAuth = async () => {
          try {
            await auth.signInAnonymously();
          } catch (error) {
            console.error("Auth error:", error);
            setFirebaseError(error.message);
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged((user) => {
          setAuthUser(user);
          if (!user) setIsLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!authUser) return;

        // 連接到你的專屬資料表
        const usersRef = db.collection('event_users');
        const unsubscribe = usersRef.onSnapshot((snapshot) => {
          const usersList = [];
          snapshot.forEach(doc => {
            usersList.push({ id: doc.id, ...doc.data() });
          });
          
          usersList.sort((a, b) => b.points - a.points);
          setAllUsers(usersList);

          const currentProfile = usersList.find(u => u.id === authUser.uid);
          setProfile(currentProfile || null);
          
          setIsLoading(false);
        }, (error) => {
          console.error("Firestore error:", error);
          setFirebaseError(error.message);
          setIsLoading(false);
        });

        return () => unsubscribe();
      }, [authUser]);

      useEffect(() => {
        if (firebaseError) {
          setView('error');
        } else if (isLoading) {
          setView('loading');
        } else if (authUser && !profile) {
          setView('setup');
        } else if (isAdmin) {
          setView('admin');
        } else {
          setView('dashboard');
        }
      }, [isLoading, authUser, profile, isAdmin, firebaseError]);

      const handleCreateProfile = async () => {
        const trimmedName = setupName.trim();
        if (!trimmedName) return;

        const isDuplicate = allUsers.some(user => user.name.toLowerCase() === trimmedName.toLowerCase());
        if (isDuplicate) {
          setSetupError('這個暱稱已經被使用囉，請換一個！');
          return;
        }

        setIsLoading(true);
        setSetupError('');
        try {
          await db.collection('event_users').doc(authUser.uid).set({
            name: trimmedName,
            avatar: setupAvatar,
            points: 0,
            score: 0,
            createdAt: Date.now()
          });
        } catch (error) {
          console.error("Error creating profile:", error);
          setIsLoading(false);
        }
      };

      const handleAdminLogin = () => {
        if (adminPwdInput === ADMIN_PASSWORD) {
          setIsAdmin(true);
          setShowAdminModal(false);
          setAdminPwdInput('');
          setAdminError('');
        } else {
          setAdminError('密碼錯誤，請重試！');
        }
      };

      const handleUpdateData = async (userId, newPoints, newScore) => {
        try {
          await db.collection('event_users').doc(userId).update({ points: newPoints, score: newScore });
        } catch (error) {
          console.error("Error updating data:", error);
        }
      };

      const handleUpdateMyScore = async () => {
        setIsUpdatingMyScore(true);
        let validScore = Number(myScoreInput);
        if (validScore < 0) validScore = 0;
        if (validScore > MAX_POINTS) validScore = MAX_POINTS;

        try {
          await db.collection('event_users').doc(authUser.uid).update({ score: validScore });
        } catch (error) {
          console.error("Error updating my score:", error);
        }
        setIsUpdatingMyScore(false);
      };

      if (view === 'error') {
        return (
          <div className="min-h-screen bg-red-50 flex flex-col items-center justify-center p-4">
            <ShieldAlertIcon className="w-16 h-16 text-red-500 mb-4" />
            <h1 className="text-2xl font-bold text-red-800 mb-2">資料庫連接錯誤</h1>
            <p className="text-red-600 text-center max-w-md">{firebaseError}</p>
          </div>
        );
      }

      if (view === 'loading') {
        return (
          <div className="min-h-screen bg-indigo-50 flex items-center justify-center">
            <div className="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent"></div>
          </div>
        );
      }

      if (view === 'setup') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-indigo-100 to-purple-100 flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
              <div className="text-center mb-8">
                <TrophyIcon className="w-16 h-16 text-yellow-500 mx-auto mb-4" />
                <h1 className="text-2xl font-bold text-gray-800">歡迎加入任務挑戰！</h1>
                <p className="text-gray-500 mt-2">請設定你的專屬頭像與暱稱</p>
              </div>

              <div className="space-y-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">選擇頭像</label>
                  <div className="grid grid-cols-5 gap-3">
                    {AVATARS.map((emoji) => (
                      <button key={emoji} onClick={() => setSetupAvatar(emoji)} className={`text-3xl p-2 rounded-xl transition-all ${setupAvatar === emoji ? 'bg-indigo-100 ring-2 ring-indigo-500 transform scale-110' : 'bg-gray-50 hover:bg-gray-100'}`}>
                        {emoji}
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">你的暱稱</label>
                  <input type="text" value={setupName} onChange={(e) => { setSetupName(e.target.value); setSetupError(''); }} placeholder="例如：闖關大師" className={`w-full px-4 py-3 rounded-xl border ${setupError ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : 'border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500'} outline-none transition-all`} maxLength={15} />
                  {setupError && <p className="text-red-500 text-sm mt-2 font-medium">{setupError}</p>}
                </div>
                <button onClick={handleCreateProfile} disabled={!setupName.trim()} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                  開始集點！
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-50">
          <nav className="bg-white shadow-sm sticky top-0 z-10">
            <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center space-x-2">
                <TrophyIcon className="w-6 h-6 text-yellow-500" />
                <span className="font-bold text-lg text-gray-800">任務集點大挑戰</span>
              </div>
              <div className="flex items-center space-x-4">
                {profile && !isAdmin && (
                  <div className="flex items-center space-x-2 bg-indigo-50 px-3 py-1.5 rounded-full">
                    <span className="text-xl">{profile.avatar}</span>
                    <span className="font-medium text-indigo-900 text-sm hidden sm:block">{profile.name}</span>
                    <span className="bg-indigo-600 text-white text-xs font-bold px-2 py-0.5 rounded-full flex items-center gap-1">
                      🐾 {profile.points}
                    </span>
                  </div>
                )}
                {isAdmin ? (
                  <button onClick={() => setIsAdmin(false)} className="flex items-center space-x-1 text-sm text-gray-600 hover:text-indigo-600 font-medium">
                    <LogOutIcon className="w-4 h-4" />
                    <span>離開後台</span>
                  </button>
                ) : (
                  <button onClick={() => setShowAdminModal(true)} className="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors" title="管理員登入">
                    <SettingsIcon className="w-5 h-5" />
                  </button>
                )}
              </div>
            </div>
          </nav>

          <main className="max-w-4xl mx-auto px-4 py-8">
            {view === 'dashboard' && (
              <div className="space-y-6">
                {profile && (
                  <div className="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-6 sm:p-8 text-white shadow-lg flex flex-col sm:flex-row items-center justify-between gap-6">
                    <div className="flex items-center space-x-4">
                      <div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center text-5xl shadow-inner">
                        {profile.avatar}
                      </div>
                      <div>
                        <h2 className="text-2xl font-bold">{profile.name}</h2>
                        <p className="text-indigo-100 mt-1">繼續完成任務，累積集點與戰績吧！</p>
                      </div>
                    </div>
                    <div className="flex space-x-3">
                      <div className="text-center bg-white/10 px-5 py-4 rounded-xl backdrop-blur-sm min-w-[100px] flex flex-col items-center justify-center">
                        <p className="text-indigo-100 text-sm font-medium mb-2">我的集點</p>
                        <div className="text-2xl mb-1 min-h-[32px] flex items-center justify-center">
                          <PointVisualizer points={profile.points} />
                        </div>
                        <p className="text-xs text-indigo-200 mt-auto font-medium">共 {profile.points} 點</p>
                      </div>
                      <div className="text-center bg-white/10 px-5 py-4 rounded-xl backdrop-blur-sm min-w-[120px]">
                        <p className="text-indigo-100 text-sm font-medium mb-2">我的戰績</p>
                        <div className="flex flex-col items-center gap-2">
                          <input type="number" min="0" max={MAX_POINTS} value={myScoreInput} onChange={(e) => setMyScoreInput(e.target.value)} className="w-20 px-2 py-1 rounded text-center font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
                          <button onClick={handleUpdateMyScore} disabled={isUpdatingMyScore || Number(myScoreInput) === profile.score} className="text-xs bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white px-3 py-1 rounded-full transition-colors w-full font-medium">
                            {isUpdatingMyScore ? '儲存中...' : '更新數字'}
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                  <div className="px-6 py-5 border-b border-gray-100 bg-gray-50/50 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <h3 className="text-lg font-bold text-gray-800 flex items-center">
                      <AwardIcon className="w-5 h-5 text-indigo-500 mr-2" />
                      即時戰況排行榜
                    </h3>
                    <div className="flex items-center space-x-3 text-xs text-gray-500 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-100">
                      <span className="font-medium text-gray-500">💡 獲得 1 點 = 蓋 1 個 🐾 任務章</span>
                    </div>
                  </div>
                  <div className="p-6 space-y-6">
                    {allUsers.length === 0 ? (
                      <p className="text-center text-gray-500 py-8">目前還沒有參與者加入哦！</p>
                    ) : (
                      allUsers.map((user, index) => {
                        const highestScore = Math.max(...allUsers.map(u => u.score || 0), 10);
                        const widthPercent = Math.min(((user.score || 0) / highestScore) * 100, 100);
                        const isMe = profile && user.id === profile.id;

                        return (
                          <div key={user.id} className={`relative flex items-center ${isMe ? 'opacity-100' : 'opacity-90'}`}>
                            <div className="w-8 text-center font-bold text-gray-400 mr-2">{index + 1}</div>
                            <div className="flex-1">
                              <div className="flex justify-between items-end mb-1">
                                <span className="font-medium text-gray-700 flex items-center">
                                  <span className="text-xl mr-2">{user.avatar}</span>
                                  {user.name}
                                  {isMe && <span className="ml-2 text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded">我</span>}
                                </span>
                                <div className="flex flex-col items-end max-w-[50%]">
                                  <PointVisualizer points={user.points} />
                                </div>
                              </div>
                              <div className="flex items-center space-x-2 mt-1.5">
                                <span className="text-xs text-gray-400 font-medium w-6">戰績</span>
                                <div className="flex-1 h-3 bg-gray-100 rounded-full overflow-hidden">
                                  <div className={`h-full rounded-full transition-all duration-1000 ease-out ${index === 0 ? 'bg-yellow-400' : index === 1 ? 'bg-gray-400' : index === 2 ? 'bg-amber-600' : 'bg-indigo-400'}`} style={{ width: `${widthPercent}%` }}></div>
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              </div>
            )}

            {view === 'admin' && (
              <div className="space-y-6">
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                  <div className="px-6 py-5 border-b border-gray-100 bg-indigo-50 flex justify-between items-center">
                    <h3 className="text-lg font-bold text-indigo-900 flex items-center">
                      <ShieldAlertIcon className="w-5 h-5 text-indigo-600 mr-2" />
                      任務審核與數據發放 (後台)
                    </h3>
                    <span className="text-sm text-indigo-600 font-medium bg-white px-3 py-1 rounded-full shadow-sm">
                      共 {allUsers.length} 位參與者
                    </span>
                  </div>
                  <div className="divide-y divide-gray-100">
                    {allUsers.length === 0 ? (
                      <p className="text-center text-gray-500 py-12">目前還沒有參與者</p>
                    ) : (
                      allUsers.map((user) => <AdminUserRow key={user.id} user={user} onUpdate={handleUpdateData} />)
                    )}
                  </div>
                </div>
              </div>
            )}
          </main>

          {showAdminModal && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className="px-6 py-4 border-b flex justify-between items-center">
                  <h3 className="font-bold text-gray-800">管理員登入</h3>
                  <button onClick={() => { setShowAdminModal(false); setAdminError(''); setAdminPwdInput(''); }} className="text-gray-400 hover:text-gray-600">
                    <XIcon className="w-5 h-5" />
                  </button>
                </div>
                <div className="p-6">
                  <label className="block text-sm font-medium text-gray-700 mb-2">請輸入管理員密碼</label>
                  <input type="password" value={adminPwdInput} onChange={(e) => setAdminPwdInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAdminLogin()} className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="輸入密碼..." autoFocus />
                  {adminError && <p className="text-red-500 text-sm mt-2">{adminError}</p>}
                  <button onClick={handleAdminLogin} className="w-full mt-6 bg-indigo-600 text-white font-medium py-2.5 rounded-lg hover:bg-indigo-700 transition-colors">確認登入</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
