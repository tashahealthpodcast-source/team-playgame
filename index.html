<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任務集點大挑戰</title>

  <!-- 引入 Tailwind CSS 負責排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 核心 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com-react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- 引入 Babel 負責在瀏覽器中編譯 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 Firebase Compat 版本 -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <!-- React 渲染的目標節點 -->
  <div id="root"></div>

  <!-- 應用程式邏輯 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // ⚠️ 請在這裡填入你專屬的 Firebase 設定！
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCNxj337AbO8zTjoAWJnq9oq6gxRef_g1U",
      authDomain: "team-playgame.firebaseapp.com",
      projectId: "team-playgame",
      storageBucket: "team-playgame.firebasestorage.app",
      messagingSenderId: "546707511652",
      appId: "1:546707511652:web:0e791695e1dc6515edc271",
      measurementId: "G-VMXE0S53LN"
    };

    // 初始化 Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- Constants ---
    const AVATARS = ['🐶', '🐱', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷'];
    const MAX_POINTS = 9999;
    const ADMIN_PASSWORD = 'admin123';
    const STORAGE_KEY = 'event_user_login';

    // --- 圖示元件 ---
    const TrophyIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
    const ShieldAlertIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>;
    const SettingsIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    const LogOutIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
    const XIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const AwardIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;
    const UserIcon = (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;

    // --- Components ---

    const PointVisualizer = ({ points }) => {
      if (!points || points === 0) return <span className="text-gray-400 text-sm font-medium">尚未獲得</span>;
      const displayCount = Math.min(points, 100);
      return (
        <div className="flex flex-wrap gap-1 items-center justify-end">
          {Array.from({ length: displayCount }).map((_, i) => (
            <span key={i} title={`第 ${i + 1} 點`} className="text-lg sm:text-xl drop-shadow-sm hover:scale-110 transition-transform cursor-default">🐾</span>
          ))}
          {points > 100 && <span className="text-sm text-gray-500 ml-1 font-bold">+{points - 100}</span>}
        </div>
      );
    };

    const AdminUserRow = ({ user, onUpdate }) => {
      const [editName, setEditName] = useState(user.name);
      const [editPoints, setEditPoints] = useState(user.points || 0);
      const [editScore, setEditScore] = useState(user.score || 0);
      const [isSaving, setIsSaving] = useState(false);

      const handleSave = async () => {
        setIsSaving(true);
        let validPoints = Number(editPoints);
        if (validPoints < 0) validPoints = 0;
        if (validPoints > MAX_POINTS) validPoints = MAX_POINTS;

        let validScore = Number(editScore);
        if (validScore < 0) validScore = 0;
        if (validScore > MAX_POINTS) validScore = MAX_POINTS;
        
        await onUpdate(user.id, editName, validPoints, validScore);
        setIsSaving(false);
      };

      return (
        <div className="flex flex-col p-4 bg-white border-b hover:bg-gray-50 transition-colors gap-4">
          <div className="flex items-center space-x-3">
            <span className="text-3xl">{user.avatar}</span>
            <div className="flex-1">
              <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} className="font-bold text-gray-800 bg-transparent border-b border-transparent hover:border-gray-300 focus:border-indigo-500 outline-none w-full" />
              <p className="text-xs text-gray-400 mt-1">ID: {user.id.substring(0,8)}... | 密碼: {user.password}</p>
            </div>
          </div>
          <div className="flex flex-wrap items-end justify-between gap-4 text-sm">
            <div className="flex items-center space-x-4">
              <div className="flex flex-col">
                <label className="text-xs text-gray-500 mb-1">集點數字</label>
                <input type="number" min="0" max={MAX_POINTS} value={editPoints} onChange={(e) => setEditPoints(e.target.value)} className="w-20 px-2 py-1.5 border rounded-lg text-center" />
              </div>
              <div className="flex flex-col">
                <label className="text-xs text-gray-500 mb-1">戰績數字</label>
                <input type="number" min="0" max={MAX_POINTS} value={editScore} onChange={(e) => setEditScore(e.target.value)} className="w-20 px-2 py-1.5 border rounded-lg text-center" />
              </div>
            </div>
            <button onClick={handleSave} disabled={isSaving || (editName === user.name && Number(editPoints) === user.points && Number(editScore) === (user.score || 0))} className={`px-4 py-2 rounded-lg font-medium transition-all ${isSaving ? 'bg-gray-200 text-gray-400' : 'bg-indigo-600 text-white hover:bg-indigo-700 disabled:opacity-50'}`}>
              {isSaving ? '儲存中...' : '更新資料'}
            </button>
          </div>
        </div>
      );
    };

    function App() {
      const [authUser, setAuthUser] = useState(null);
      const [allUsers, setAllUsers] = useState([]);
      const [profile, setProfile] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [firebaseError, setFirebaseError] = useState('');
      
      const [view, setView] = useState('loading'); // loading, entry, dashboard, admin
      const [entryMode, setEntryMode] = useState('signup'); // signup, login
      
      const [setupName, setSetupName] = useState('');
      const [setupPassword, setSetupPassword] = useState('');
      const [setupAvatar, setSetupAvatar] = useState(AVATARS[0]);
      const [setupError, setSetupError] = useState('');
      
      const [showAdminModal, setShowAdminModal] = useState(false);
      const [adminPwdInput, setAdminPwdInput] = useState('');
      const [adminError, setAdminError] = useState('');
      const [isAdmin, setIsAdmin] = useState(false);

      const [myScoreInput, setMyScoreInput] = useState('');
      const [isUpdatingMyScore, setIsUpdatingMyScore] = useState(false);

      useEffect(() => {
        if (profile) setMyScoreInput(profile.score?.toString() || '0');
      }, [profile?.score]);

      // 初始化 Firebase 與 檢查本地儲存
      useEffect(() => {
        const init = async () => {
          try {
            await auth.signInAnonymously();
            
            // 嘗試自動登入
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
              const { name, password } = JSON.parse(saved);
              setSetupName(name);
              setSetupPassword(password);
            }
          } catch (error) {
            setFirebaseError(error.message);
          }
        };
        init();

        const unsubscribe = auth.onAuthStateChanged(user => setAuthUser(user));
        return () => unsubscribe();
      }, []);

      // 監聽所有使用者數據
      useEffect(() => {
        if (!authUser) return;
        const unsubscribe = db.collection('event_users').onSnapshot((snapshot) => {
          const usersList = [];
          snapshot.forEach(doc => usersList.push({ id: doc.id, ...doc.data() }));
          usersList.sort((a, b) => b.points - a.points);
          setAllUsers(usersList);
          setIsLoading(false);
        }, (error) => {
          setFirebaseError(error.message);
          setIsLoading(false);
        });
        return () => unsubscribe();
      }, [authUser]);

      // 決定目前視圖
      useEffect(() => {
        if (firebaseError) setView('error');
        else if (isLoading) setView('loading');
        else if (!profile) setView('entry');
        else if (isAdmin) setView('admin');
        else setView('dashboard');
      }, [isLoading, profile, isAdmin, firebaseError]);

      // 處理登入/註冊邏輯
      const handleEntry = async () => {
        const name = setupName.trim();
        const pwd = setupPassword.trim();
        if (!name || !pwd) {
          setSetupError('請填寫暱稱與密碼喔！');
          return;
        }

        if (entryMode === 'signup') {
          if (allUsers.some(u => u.name.toLowerCase() === name.toLowerCase())) {
            setSetupError('這個暱稱已經有人用過囉，換一個吧！');
            return;
          }
          setIsLoading(true);
          try {
            const userData = {
              name,
              password: pwd,
              avatar: setupAvatar,
              points: 0,
              score: 0,
              createdAt: Date.now()
            };
            await db.collection('event_users').doc(authUser.uid).set(userData);
            setProfile({ id: authUser.uid, ...userData });
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ name, password: pwd }));
          } catch (e) { setSetupError(e.message); setIsLoading(false); }
        } else {
          // 登入模式：尋找匹配的使用者
          const found = allUsers.find(u => u.name === name && u.password === pwd);
          if (found) {
            setProfile(found);
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ name, password: pwd }));
          } else {
            setSetupError('暱稱或密碼不正確喔，請再檢查一下！');
          }
        }
      };

      const handleAdminLogin = () => {
        if (adminPwdInput === ADMIN_PASSWORD) {
          setIsAdmin(true);
          setShowAdminModal(false);
          setAdminPwdInput('');
        } else setAdminError('密碼錯誤！');
      };

      const handleUpdateData = async (userId, newName, newPoints, newScore) => {
        try {
          await db.collection('event_users').doc(userId).update({ 
            name: newName, 
            points: newPoints, 
            score: newScore 
          });
          // 如果剛好改到自己，更新本地 profile
          if (profile && userId === profile.id) {
            setProfile({ ...profile, name: newName, points: newPoints, score: newScore });
          }
        } catch (e) { console.error(e); }
      };

      const handleUpdateMyScore = async () => {
        setIsUpdatingMyScore(true);
        let score = Math.min(Math.max(Number(myScoreInput), 0), MAX_POINTS);
        try {
          await db.collection('event_users').doc(profile.id).update({ score });
          setProfile({ ...profile, score });
        } catch (e) { console.error(e); }
        setIsUpdatingMyScore(false);
      };

      const handleLogout = () => {
        localStorage.removeItem(STORAGE_KEY);
        setProfile(null);
        setSetupName('');
        setSetupPassword('');
        setEntryMode('login');
      };

      if (view === 'error') return (
        <div className="min-h-screen bg-red-50 flex flex-col items-center justify-center p-4">
          <ShieldAlertIcon className="w-16 h-16 text-red-500 mb-4" />
          <h1 className="text-2xl font-bold text-red-800 mb-2">資料庫連接錯誤</h1>
          <p className="text-red-600 text-center max-w-md">{firebaseError}</p>
        </div>
      );

      if (view === 'loading') return (
        <div className="min-h-screen bg-indigo-50 flex items-center justify-center">
          <div className="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent"></div>
        </div>
      );

      if (view === 'entry') return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-100 to-purple-100 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
            <div className="text-center mb-8">
              <TrophyIcon className="w-16 h-16 text-yellow-500 mx-auto mb-4" />
              <h1 className="text-2xl font-bold text-gray-800">
                {entryMode === 'signup' ? '歡迎加入任務挑戰！' : '歡迎回來！'}
              </h1>
              <p className="text-gray-500 mt-2">請登入或建立您的參與帳號</p>
            </div>

            <div className="space-y-4">
              {entryMode === 'signup' && (
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">選擇頭像</label>
                  <div className="grid grid-cols-5 gap-2">
                    {AVATARS.map((emoji) => (
                      <button key={emoji} onClick={() => setSetupAvatar(emoji)} className={`text-2xl p-2 rounded-xl transition-all ${setupAvatar === emoji ? 'bg-indigo-100 ring-2 ring-indigo-500' : 'bg-gray-50'}`}>
                        {emoji}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">暱稱</label>
                <input type="text" value={setupName} onChange={(e) => { setSetupName(e.target.value); setSetupError(''); }} placeholder="例如：闖關大師" className="w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none" />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">密碼 (下次登入使用)</label>
                <input type="password" value={setupPassword} onChange={(e) => { setSetupPassword(e.target.value); setSetupError(''); }} placeholder="設定簡單的密碼" className="w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none" />
              </div>

              {setupError && <p className="text-red-500 text-sm font-medium">{setupError}</p>}

              <button onClick={handleEntry} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-indigo-700 transition-all">
                {entryMode === 'signup' ? '立即加入' : '確認登入'}
              </button>

              <div className="text-center mt-4">
                <button onClick={() => { setEntryMode(entryMode === 'signup' ? 'login' : 'signup'); setSetupError(''); }} className="text-sm text-indigo-600 font-medium hover:underline">
                  {entryMode === 'signup' ? '已經有帳號了？點我登入' : '還沒加入？點我註冊'}
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-50">
          <nav className="bg-white shadow-sm sticky top-0 z-10">
            <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center space-x-2">
                <TrophyIcon className="w-6 h-6 text-yellow-500" />
                <span className="font-bold text-lg text-gray-800">任務集點大挑戰</span>
              </div>
              <div className="flex items-center space-x-3">
                {profile && !isAdmin && (
                  <div className="flex items-center space-x-2 bg-indigo-50 px-3 py-1 rounded-full">
                    <span className="text-xl">{profile.avatar}</span>
                    <span className="font-medium text-indigo-900 text-sm hidden sm:block">{profile.name}</span>
                    <button onClick={handleLogout} title="登出並換帳號" className="p-1 text-gray-400 hover:text-red-500"><LogOutIcon className="w-4 h-4"
